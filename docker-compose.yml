services:
  # API (NestJS)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      - redis-users
      - redis-search
      - mongodb-users
      - mongodb-stock
      - kafka
    environment:
      - NODE_ENV=development
      - MONGO_URL=mongodb://mongodb-users:27017/users
      - MONGO_URL_STOCK=mongodb://mongodb-stock:27017/stock
      - REDIS_URL=redis://redis-users:6379
      - REDIS_SEARCH_URL=redis://redis-search:6379
      - KAFKA_BROKER=kafka:9092
    networks:
      - backend

  # Landing (Next.js)
  landing:
    build:
      context: ./apps/landing
      dockerfile: Dockerfile
    container_name: landing
    ports:
      - "4000:4000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    networks:
      - frontend

  # Dashboard (Next.js)
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
    networks:
      - frontend

  # Redis for Users
  redis-users:
    image: redis:alpine
    container_name: redis-users
    networks:
      - backend
    volumes:
      - redis-users-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # Redis for Search Product
  redis-search:
    image: redis:alpine
    container_name: redis-search
    networks:
      - backend
    volumes:
      - redis-search-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # MongoDB for Users
  mongodb-users:
    image: mongo:latest
    container_name: mongodb-users
    networks:
      - backend
    volumes:
      - mongodb-users-data:/data/db
    ports:
      - "27017:27017"

  # MongoDB for Stock
  mongodb-stock:
    image: mongo:latest
    container_name: mongodb-stock
    networks:
      - backend
    volumes:
      - mongodb-stock-data:/data/db
    ports:
      - "27018:27017"

  # Kafka
  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    networks:
      - backend
    environment:
      - KAFKA_ADVERTISED_LISTENERS=INSIDE://kafka:9093,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL=PLAINTEXT
      - KAFKA_LISTENER_NAME_INSIDE=INSIDE
      - KAFKA_LISTENER_PORT=9093
      - KAFKA_LISTENER_INSIDE=PLAINTEXT://0.0.0.0:9093
      - KAFKA_LISTENER=INSIDE
      - KAFKA_LISTENER_INTER_BROKER=INSIDE
      - KAFKA_LISTENER_INTER_BROKER_PORT=9093
      - KAFKA_LISTENER_NAME_EXTERNAL=EXTERNAL
      - KAFKA_LISTENER_EXTERNAL=PLAINTEXT://0.0.0.0:9092
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
    ports:
      - "9092:9092"
      - "9093:9093"
    depends_on:
      - zookeeper
    volumes:
      - /tmp/broker-metadata

  # Zookeeper
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    networks:
      - backend
    ports:
      - "2181:2181"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  redis-users-data:
    driver: local
  redis-search-data:
    driver: local
  mongodb-users-data:
    driver: local
  mongodb-stock-data:
    driver: local
